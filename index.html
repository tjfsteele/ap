<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Agile Dashboard</title>
    <meta http-equiv="refresh" content="1800">
    <style>
        body { background: white; color: black; font-family: sans-serif; text-align: center; padding-top: 15%; margin: 0; }
        #price { font-size: 150px; font-weight: bold; line-height: 1; }
        #unit { font-size: 40px; }
        #time { font-size: 20px; margin-top: 30px; color: #666; }
    </style>
</head>
<body>
    <div id="price">--</div>
    <div id="unit">p/kWh</div>
    <div id="time">Loading...</div>

    <script>
        function updatePrice() {
            var url = "https://script.google.com/macros/s/AKfycbyGDZtONwOZf7K-iq0F-wUjVMj8B4lCQVctEXKiUe2ho01P0l0llaRmpEO_DsiPWms/exec";
            var xhr = new XMLHttpRequest();
            xhr.open("GET", url, true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4) {
                    if (xhr.status == 200) {
                        document.getElementById('price').innerHTML = xhr.responseText;
                        var now = new Date();
                        document.getElementById('time').innerHTML = "Updated: " + now.getHours() + ":" + (now.getMinutes()<10?'0':'') + now.getMinutes();
                    } else {
                        document.getElementById('time').innerHTML = "Script Error: " + xhr.status;
                    }
                }
            };
            xhr.send();
        }
        // Run the function immediately
        updatePrice();
    </script>
</body>
</html>
