<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="1800"> <style>
        body { background: white; color: black; font-family: sans-serif; text-align: center; padding-top: 15%; }
        #price { font-size: 180px; font-weight: bold; line-height: 1; }
        #unit { font-size: 40px; }
        #time { font-size: 25px; margin-top: 20px; color: #666; }
    </style>
</head>
<body>
    <div id="price">...</div>
    <div id="unit">p / kWh</div>
    <div id="time">Loading...</div>

    <script>
        var url = "https://api.octopus.energy/v1/products/AGILE-24-10-01/electricity-tariffs/E-1R-AGILE-24-10-01-A/standard-unit-rates/";
        var xhr = new XMLHttpRequest();
        xhr.open("GET", url, true);
        xhr.onreadystatechange = function () {
            if (xhr.readyState == 4 && xhr.status == 200) {
                var data = JSON.parse(xhr.responseText);
                // Octopus returns latest rates first. result[0] is the "newest" price.
                var currentPrice = data.results[0].value_inc_vat;
                document.getElementById('price').innerHTML = currentPrice.toFixed(1);
                
                var now = new Date();
                document.getElementById('time').innerHTML = "Updated: " + now.getHours() + ":" + (now.getMinutes()<10?'0':'') + now.getMinutes();
            }
        };
        xhr.send();
    </script>
</body>
</html>
